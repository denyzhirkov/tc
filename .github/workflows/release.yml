name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

defaults:
  run:
    shell: bash

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Run tests
        run: cargo test --workspace --exclude tc-desktop

  build-cli:
    needs: [test]
    strategy:
      matrix:
        include:
          - os: macos-latest
            suffix: macos-arm64
            target: aarch64-apple-darwin
          - os: macos-latest
            suffix: macos-amd64
            target: x86_64-apple-darwin
          - os: ubuntu-latest
            suffix: linux-amd64
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-latest
            suffix: linux-arm64
            target: aarch64-unknown-linux-gnu
            use_cross: true
          - os: windows-latest
            suffix: windows-amd64
            target: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross
        if: matrix.use_cross
        run: cargo install cross --locked

      - name: Build
        env:
          CMAKE_POLICY_VERSION_MINIMUM: "3.5"
        run: |
          if [ "${{ matrix.use_cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }} -p tc-client -p tc-server
          else
            cargo build --release --target ${{ matrix.target }} -p tc-client -p tc-server
          fi

      - name: Package binaries
        run: |
          mkdir -p artifacts
          if [ "${{ runner.os }}" = "Windows" ]; then
            cp target/${{ matrix.target }}/release/tc-client.exe "artifacts/tc-client-${{ matrix.suffix }}.exe"
            cp target/${{ matrix.target }}/release/tc-server.exe "artifacts/tc-server-${{ matrix.suffix }}.exe"
          else
            cp target/${{ matrix.target }}/release/tc-client "artifacts/tc-client-${{ matrix.suffix }}"
            cp target/${{ matrix.target }}/release/tc-server "artifacts/tc-server-${{ matrix.suffix }}"
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cli-${{ matrix.suffix }}
          path: artifacts/*

  build-desktop:
    needs: [test]
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            args: --target aarch64-apple-darwin
          - os: macos-latest
            target: x86_64-apple-darwin
            args: --target x86_64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            args: ""
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            args: ""
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux deps
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libglib2.0-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libasound2-dev \
            libxdo-dev \
            patchelf

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: apps/desktop/pnpm-lock.yaml

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            .
            apps/desktop/src-tauri
          key: desktop-${{ matrix.target }}

      - name: Install frontend deps
        working-directory: apps/desktop
        run: pnpm install --frozen-lockfile

      - name: Build Tauri bundle
        id: tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CMAKE_POLICY_VERSION_MINIMUM: "3.5"
        with:
          projectPath: apps/desktop
          args: ${{ matrix.args }}

      - name: Stage desktop artifacts
        run: |
          mkdir -p desktop-artifacts
          paths='${{ steps.tauri.outputs.artifactPaths }}'
          echo "$paths" | python3 -c 'import json,sys,shutil,os; [shutil.copy(p, "desktop-artifacts/") for p in json.load(sys.stdin)]'

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.target }}
          path: desktop-artifacts/*

  release:
    needs: [build-cli, build-desktop]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/*
