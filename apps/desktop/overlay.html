<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>tc_ overlay</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      /* The window itself is transparent and click-through; only the HUD
         panel paints. Never show scrollbars or a body background. */
      html,
      body {
        background: transparent !important;
        margin: 0;
        overflow: hidden;
        user-select: none;
      }
    </style>
  </head>
  <body class="font-ui antialiased">
    <div id="overlay-root"></div>
    <script type="module" src="/src/overlay.tsx"></script>
  </body>
</html>
