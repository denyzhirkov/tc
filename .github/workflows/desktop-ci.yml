name: Desktop CI

on:
  push:
    branches: [master]
    paths:
      - "apps/desktop/**"
      - "crates/**"
      - ".github/workflows/desktop-ci.yml"
  pull_request:
    paths:
      - "apps/desktop/**"
      - "crates/**"

jobs:
  check:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libglib2.0-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libasound2-dev \
            libxdo-dev

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: apps/desktop/pnpm-lock.yaml

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install frontend deps
        working-directory: apps/desktop
        run: pnpm install --frozen-lockfile

      - name: Typecheck frontend
        working-directory: apps/desktop
        run: pnpm tsc --noEmit

      - name: Build frontend
        working-directory: apps/desktop
        run: pnpm vite build

      - name: cargo check (workspace)
        run: cargo check --workspace --all-targets

      - name: cargo test (workspace)
        run: cargo test --workspace

  # Core crates (no Tauri/webkit) on macOS + Windows. Linux core+desktop tests
  # run in `check` above; here we cover the OS-specific paths that only execute
  # on their own platform: the UDP batch sender (sendmsg_x on macOS, sequential
  # fallback on Windows) and connected-UDP / IPv6 behaviour.
  test-core:
    name: Core tests (cross-platform)
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          key: core-${{ matrix.os }}

      - name: cargo test (core crates)
        run: cargo test --workspace --exclude tc-desktop
